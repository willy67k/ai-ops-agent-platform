version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "6970:6970"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - ai-ops-network

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "6969:80"
    depends_on:
      - backend
    networks:
      - ai-ops-network

networks:
  ai-ops-network:
    driver: bridge
