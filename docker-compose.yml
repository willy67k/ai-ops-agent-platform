version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ai-ops-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-ops-network

  redis:
    image: redis:7-alpine
    container_name: ai-ops-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ai-ops-network

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "6890:6890"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgres://postgres:password123@db:5432/ai_ops
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - ai-ops-network

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "6969:80"
    depends_on:
      - backend
    networks:
      - ai-ops-network

volumes:
  postgres_data:

networks:
  ai-ops-network:
    driver: bridge
